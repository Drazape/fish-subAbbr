[project]
repo_url = "https://github.com/Drazape/fish-subAbbr"
site_name = "fish-subAbbr Documentation"
site_description = "Documentation for the Fish context-aware sub-command abbreviation utility: fish-subAbbr"
site_author = "Drazape"
site_url = "https://Drazape.github.io/fish-subAbbr/"
copyright = """
  Copyright &copy; 2026 Drazape –
  <a href="#__consent">Change cookie settings</a>
"""
docs_dir = "docs/pages/"
site_dir = "docs/site/"
custom_dir = "docs/overrides/"

[project.extra]
generator = false
social = [
  {
    name = "GitHub",
    icon = "fontawesome/brands/github",
    link = "https://github.com/Drazape",
  },
  {
    name = "Discord",
    icon = "fontawesome/brands/discord",
    link = "https://discord.com/users/847672200139243540",
  },
  {
    name = "E-mail",
    icon = "fontawesome/solid/envelope",
    link = "mailto:Drazape@outlook.com",
  },
]

[project.extra.consent]
title = "Cookie consent"
actions = ["accept", "manage",]
description = """
    We use cookies to recognize your repeated visits and preferences, as well
    as to measure the effectiveness of our documentation and whether users
    find what they're searching for. With your consent, you're helping us to
    make our documentation better.
"""


# Defaults
[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.path",
    "navigation.tabs",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
]

[project.extra.analytics]
provider = "google"
property = "G-1HMR94XE1F"

[project.extra.analytics.feedback]
title = "Was this page helpful?"

[[project.extra.analytics.feedback.ratings]]
icon = "material/emoticon-happy-outline"
name = "This page was helpful"
data = 1
note = "Thanks for your feedback!"

[[project.extra.analytics.feedback.ratings]]
icon = "material/emoticon-sad-outline"
name = "This page could be improved"
data = 0
note = """
  Thanks for your feedback! Help us improve this page by
  using our <a href="..." target="_blank" rel="noopener">feedback form</a>.
"""

[project.markdown_extensions]
abbr = {}
admonition = {}
attr_list = {}
def_list = {}
footnotes = {}
md_in_html = {}
toc.permalink = true

[project.markdown_extensions.pymdownx]
blocks.caption = {}
arithmatex.generic = true
betterem = {}
caret = {}
details = {}
emoji = { emoji_generator = "zensical.extensions.emoji.to_svg", emoji_index = "zensical.extensions.emoji.twemoji", }
highlight = { anchor_linenums = true, line_spans = "__span", pygments_lang_class = true, }
inlinehilite = {}
keys = {}
magiclink = {}
mark = {}
smartsymbols = {}
snippets = {}
superfences.custom_fences = [{ name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format", },]
tabbed = { alternate_style = true, combine_header_slug = true, }
tasklist.custom_checkbox = true
tilde = {}

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle = { icon = "lucide/moon", name = "Switch to light mode", }

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle = { icon = "lucide/sun", name = "Switch to dark mode", }
